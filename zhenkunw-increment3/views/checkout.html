<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Wendy Wang">
    <meta name="keywords" content="Museum, Checkout, MonoMuse">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | MonoMuse</title>

    <link rel="stylesheet" href="../static/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;400;700&display=swap" rel="stylesheet">


</head>
<body onload = "addYear()">
    <header>
        <nav>
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a class="cta" href="tickets.html">Buy Tickets</a>
            <a id="navselected" href="checkout.html">Checkout</a>
        </nav>
    </header>

    <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">

    <main>
        <section>
            <h2>Checkout</h2>
            <p>Please fill out the form below to reserve your tickets.</p>

            <form>
                <label for="fullname">Full Name</label><br>
                <input type="text" id="fullname" name="fullname" required><br>

                <label for="email">Email</label><br>
                <input type="email" id="email" name="email" required><br>

                <label for="tickettype">Ticket Type</label><br>
                <select id="tickettype" name="tickettype">
                    <option value="adult">Adult</option>
                    <option value="student">Student</option>
                    <option value="child">Child</option>
                    <option value="senior">Senior</option>
                </select><br>

                <label for="quantity">Quantity</label><br>
                <input type="number" id="quantity" name="quantity" min="1" max="10" required><br>

                <label for="visitdate">Visit Date</label><br>
                <input type="date" id="visitdate" name="visitdate" required><br>

                <button type="submit">Complete Purchase</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="copyYear"></span> MonoMuse Museum. All rights reserved.</p>
    </footer>
    <script src="../static/script.js"></script>
</body>
</html>
